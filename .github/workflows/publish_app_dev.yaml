name: app-build-action-dev-MODIFIED

on:
  workflow_dispatch:
  push:
    tags:
      - "dev_v*"

jobs:
  # 第一部分：打包 Android、iOS、macOS
  build-mac-ios-android:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      - name: Fix Android Config & Dependencies
        run: |
          cd simple_live_app
          # 1. 伪造 Android 密钥配置文件，防止 gradle 报错
          echo "storePassword=dummy" > android/key.properties
          echo "keyPassword=dummy" >> android/key.properties
          echo "keyAlias=dummy" >> android/key.properties
          echo "storeFile=dummy" >> android/key.properties
          
          # 2. 强行降级导致报错的插件版本 (macOS 专用语法)
          sed -i '' 's/connectivity_plus:.*/connectivity_plus: 6.0.5/g' pubspec.yaml
          flutter pub get

      - name: Install Tools
        run: |
          npm install -g appdmg
          dart pub global activate flutter_distributor

      - name: Build APK (Debug/Unsigned)
        run: |
          cd simple_live_app
          # 使用 debug 模式，彻底避开签名逻辑
          flutter build apk --debug --split-per-abi

      - name: Build MacOS (No Sign)
        run: |
          cd simple_live_app
          # 注入免签名配置
          for config in macos/Runner/*.xcconfig; do
            echo "CODE_SIGNING_ALLOWED=NO" >> "$config"
            echo "CODE_SIGNING_REQUIRED=NO" >> "$config"
            echo "CODE_SIGN_IDENTITY=" >> "$config"
          done
          # 使用更稳妥的运行方式
          dart pub global run flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      - name: Upload Artifacts (Mobile & Mac)
        uses: actions/upload-artifact@v4
        with:
          name: mac-and-android-builds
          path: |
            simple_live_app/build/app/outputs/flutter-apk/*.apk
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip

  # 第二部分：打包 Linux
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv
      - name: Build Linux
        run: |
          cd simple_live_app
          # Linux 版本的 sed 语法
          sed -i 's/connectivity_plus:.*/connectivity_plus: 6.0.5/g' pubspec.yaml
          flutter config --enable-linux-desktop
          flutter pub get
          dart pub global activate flutter_distributor
          dart pub global run flutter_distributor package --platform linux --targets deb,zip --skip-clean
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

  # 第三部分：打包 Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Build Windows
        shell: bash
        run: |
          cd simple_live_app
          # Windows(Git Bash) 版本的 sed 语法
          sed -i 's/connectivity_plus:.*/connectivity_plus: 6.0.5/g' pubspec.yaml
          flutter config --enable-windows-desktop
          flutter pub get
          dart pub global activate flutter_distributor
          # 使用 dart pub global run 避开路径问题
          dart pub global run flutter_distributor package --platform windows --targets zip --skip-clean
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            simple_live_app/build/dist/*/*.zip
