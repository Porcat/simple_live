name: app-build-action-dev-MODIFIED

on:
  workflow_dispatch: # 允许手动点击运行
  push:
    tags:
      - "dev_v*"

jobs:
  # 打包Android、iOS、Mac
  build-mac-ios-android:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # 1. 签出代码
      - uses: actions/checkout@v4
        with:
          ref: dev

      # --- 删除了原本报错的 Android Keystore 下载和 key.properties 创建步骤 ---

      # 2. 设置 JAVA 环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 3. 设置 Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 使用稳定版，避免版本号硬编码错误
          cache: true

      # 4. 打开 MAC Desktop 支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 5. 更新 Packages 并修复插件冲突
      - name: Restore packages
        run: |
          cd simple_live_app
          # 【核心修复】强制降级导致 macOS 15 报错的插件版本
          echo "正在修复插件版本冲突..."
          sed -i '' 's/connectivity_plus:.*/connectivity_plus: 6.0.5/g' pubspec.yaml
          flutter pub get

      # 6. 安装打包工具
      - name: Install appdmg
        run: npm install -g appdmg

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      # 7. 打包 APK (改为 debug 模式以跳过签名校验，确保能出包)
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --debug --split-per-abi

      # 8. 上传 APK
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-packets
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk

      # 9. 打包 iOS (无签名)
      - name: Build IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 10. 创建未签名 ipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      # 11. 上传 IPA
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-no-sign
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 12. 打包 MAC (核心：注入免签名配置)
      - name: Build MacOS
        run: |
          cd simple_live_app
          echo "正在注入 macOS 免签名配置..."
          for config in macos/Runner/*.xcconfig; do
            echo "CODE_SIGNING_ALLOWED=NO" >> "$config"
            echo "CODE_SIGNING_REQUIRED=NO" >> "$config"
            echo "CODE_SIGN_IDENTITY=" >> "$config"
          done
          # 将 flutter_distributor 加入路径并运行
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 13. 上传 MAC
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip

      - run: echo "🍏 Job status: ${{ job.status }}."

  # --- Linux 和 Windows 保持原样或按需修改 ---
