name: Build macOS App (Final Fix V2)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Locate App and Build
        run: |
          # 1. 寻找包含 macos 配置的文件夹
          APP_DIR=$(find . -name "macos" -type d -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "检测到主程序目录: $APP_DIR"
          cd "$APP_DIR"
          
          # 2. 获取依赖
          flutter pub get
          
          # 3. 开启 macOS 支持
          flutter config --enable-macos-desktop
          
          # 4. 执行编译（注意：--release 后面必须要有一个空格，然后是两个横杠 --）
          # 这次我们将参数写得更标准，防止它找错文件
          flutter build macos --release -- --xcode-arguments CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY="" GENERATE_INFOPLIST_FILE=YES

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Live-Mac-App
          # 确保能抓取到生成的 .app
          path: |
            **/build/macos/Build/Products/Release/*.app
