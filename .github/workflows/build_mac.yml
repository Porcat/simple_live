name: Build macOS App (Force Fix V2)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure and Build
        run: |
          # 1. 进入主程序目录
          cd "./simple_live_app"

          # 2. 注入免签名配置
          echo "正在注入免签名配置..."
          for config in macos/Runner/*.xcconfig; do
            echo "CODE_SIGNING_ALLOWED=NO" >> "$config"
            echo "CODE_SIGNING_REQUIRED=NO" >> "$config"
            echo "CODE_SIGN_IDENTITY=" >> "$config"
          done

          # 3. 强行锁定插件版本，防止 macOS 26.0 错误
          # 使用更通用的匹配模式，确保把所有 connectivity_plus 的版本引用都改为 6.0.5
          echo "正在强行降级插件版本..."
          sed -i '' 's/connectivity_plus:.*/connectivity_plus: 6.0.5/g' pubspec.yaml
          
          # 4. 环境准备
          flutter clean
          flutter pub get
          flutter config --enable-macos-desktop
          
          # 5. 执行编译
          flutter build macos --release

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Live-Mac-App
          path: |
            simple_live_app/build/macos/Build/Products/Release/*.app
