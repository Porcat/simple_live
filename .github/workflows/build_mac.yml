name: Build macOS App (Final Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Locate App and Build
        run: |
          # 1. 寻找真正包含 macos 配置的文件夹
          # 我们不只是找 pubspec.yaml，我们要找的是旁边有 macos 目录的那个
          APP_DIR=$(find . -name "macos" -type d -not -path "*/.*" | head -n 1 | xargs dirname)
          
          if [ -z "$APP_DIR" ]; then
            echo "错误：没找到包含 macos 配置的文件夹！"
            exit 1
          fi
          
          echo "检测到主程序目录: $APP_DIR"
          cd "$APP_DIR"
          
          # 2. 获取依赖
          flutter pub get
          
          # 3. 开启 macOS 支持
          flutter config --enable-macos-desktop
          
          # 4. 执行编译（使用 Xcode 参数来跳过签名，而不是 --no-codesign）
          # 这是绕过 "Could not find an option named --no-codesign" 的正确姿势
          flutter build macos --release -- --xcode-arguments CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGNING_IDENTITY=""

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Live-Mac-App
          # 自动匹配编译出的 .app 文件
          path: |
            **/build/macos/Build/Products/Release/*.app
