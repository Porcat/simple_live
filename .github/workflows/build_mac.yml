name: Build macOS App (Bypass Sign)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure and Build
        run: |
          # 1. 定位主程序目录
          APP_DIR=$(find . -name "macos" -type d -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "检测到主程序目录: $APP_DIR"
          cd "$APP_DIR"
          
          # 2. 【核心改动】直接修改 Xcode 配置文件，强行关闭签名检查
          # 这样就不需要在 flutter build 命令后面带那串报错的参数了
          echo "正在注入免签名配置..."
          for config in macos/Runner/*.xcconfig; do
            echo "CODE_SIGNING_ALLOWED=NO" >> "$config"
            echo "CODE_SIGNING_REQUIRED=NO" >> "$config"
            echo "CODE_SIGN_IDENTITY=" >> "$config"
          done

          # 3. 获取依赖并开启 macOS 支持
          flutter pub get
          flutter config --enable-macos-desktop
          
          # 4. 执行编译 (这次只用最纯净的命令)
          flutter build macos --release

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Live-Mac-App
          path: |
            **/build/macos/Build/Products/Release/*.app
