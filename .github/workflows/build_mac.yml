name: Build macOS App (Force Fix)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure and Build
        run: |
          # 1. 定位目录
          APP_DIR=$(find . -name "macos" -type d -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "检测到主程序目录: $APP_DIR"
          cd "$APP_DIR"

          # 2. 注入免签名配置
          echo "正在注入免签名配置..."
          for config in macos/Runner/*.xcconfig; do
            echo "CODE_SIGNING_ALLOWED=NO" >> "$config"
            echo "CODE_SIGNING_REQUIRED=NO" >> "$config"
            echo "CODE_SIGN_IDENTITY=" >> "$config"
          done

          # 3. 【核心修正】彻底封杀 connectivity_plus 7.x 版本
          # 无论 pubspec.yaml 里怎么写的，我们强行把它改成 6.0.5
          echo "正在强行降级插件版本..."
          sed -i '' 's/connectivity_plus: .*/connectivity_plus: 6.0.5/g' pubspec.yaml
          
          # 4. 清理旧缓存并重新获取依赖
          # 这一步很重要，防止旧的 7.1.0 残留
          flutter pub clean
          flutter pub get
          
          # 5. 开启 macOS 支持并编译
          flutter config --enable-macos-desktop
          
          # 强制跳过 Pods 签名并编译
          flutter build macos --release

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Simple-Live-Mac-App
          path: |
            **/build/macos/Build/Products/Release/*.app
